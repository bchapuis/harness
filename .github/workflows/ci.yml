name: CI

# Build + lint + the full conformance suite on every change. The workspace test
# run includes the deterministic conformance tests, the catalogue drift gate
# (tests/conformance_catalogue.rs), and the fixed-seed swarm sweeps in swarm.rs
# (0..256) and cluster_swarm.rs (0..48) — the regression corpus (spec §18.6).
#
# TODO(§18.6 "many fresh seeds per change"): drive an additional swarm sweep from
# a per-run seed base (e.g. github.run_number) once swarm.rs/cluster_swarm.rs read
# a SWARM_SEED_BASE env var, so each CI run exercises fresh cluster-hours on top of
# the fixed regression corpus.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: build, lint, conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Clippy (warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (conformance suite + swarm regression corpus)
        run: cargo test --workspace

  # The microVM-grade suites (sandbox spec §3.5, machine spec §2.1): boot real
  # Firecracker VMs, so they need /dev/kvm — available on GitHub's x86_64
  # Linux runners once the udev rule below widens the device's permissions.
  # The assets (kernel, rootfs with each guest agent, VMM binary) are built by
  # the guest build scripts, which also run each agent's own test suite inside
  # rust:alpine; asset builds are cached on the script plus agent sources, so
  # an agent change rebuilds (and re-tests) while everything else reuses.
  # E2E_REQUIRE turns the KVM-gated tests' skip-on-missing-prerequisite
  # conduct into a failure here: this job exists to run them, so a broken
  # environment must not read as green.
  firecracker:
    name: firecracker microVM conformance
    runs-on: ubuntu-latest
    env:
      E2E_REQUIRE: 1
      # The e2e machine boots a small alpine guest; a smaller image keeps the
      # asset cache light.
      MACHINE_MB: 512
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Enable KVM for the runner user
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Cache the sandbox microVM assets
        id: fc-assets
        uses: actions/cache@v4
        with:
          path: guest/fc-rootfs/out
          key: fc-assets-${{ runner.os }}-${{ hashFiles('guest/fc-rootfs/build.sh', 'guest/fc-agent/**') }}

      - name: Cache the machine microVM assets
        id: machine-assets
        uses: actions/cache@v4
        with:
          path: guest/machine-rootfs/out
          key: machine-assets-${{ runner.os }}-${{ env.MACHINE_MB }}-${{ hashFiles('guest/machine-rootfs/build.sh', 'guest/machine-agent/**') }}

      - name: Build the sandbox assets (agent, rootfs, kernel, VMM)
        if: steps.fc-assets.outputs.cache-hit != 'true'
        run: guest/fc-rootfs/build.sh

      - name: Build the machine assets (agent, rootfs, kernel, VMM)
        if: steps.machine-assets.outputs.cache-hit != 'true'
        run: guest/machine-rootfs/build.sh

      - name: Clippy (feature firecracker)
        run: |
          cargo clippy -p harness-sandbox --features firecracker --all-targets -- -D warnings
          cargo clippy -p machine --features firecracker --all-targets -- -D warnings

      - name: Test the sandbox tier (protocol suite + KVM-gated conformance)
        run: cargo test -p harness-sandbox --features firecracker

      - name: Test the machine binding (ws sync suite + KVM-gated e2e)
        if: ${{ !cancelled() }}
        run: cargo test -p machine --features firecracker --lib --test firecracker_e2e
