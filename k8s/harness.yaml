# A three-node harness-standalone cluster (silos) as a StatefulSet, fronted by a
# harness-gateway StatefulSet that joins the same cluster as a non-voting,
# non-hosting CLIENT (the Orleans cluster-client pattern). Each pod has its OWN
# data volume (no shared filesystem) and a stable DNS name; the journal replicates
# over the transport (a quorum append per grain), so the nodes share nothing on
# disk.
#
# Why the gateway is a StatefulSet (not a Deployment): as a cluster client it
# needs a stable transport identity — a fixed non-voting node id and a DNS name
# the nodes admit with `--client <id>=<host>`. Ordinals give both: gateway pod N
# is node id 100+N at harness-gw-N.harness-gw.
#
# Prerequisites:
#   1. Build and load the image so the cluster can pull it (it ships both the
#      `harness-standalone` and `harness-gateway` binaries):
#        docker build -t harness-standalone:latest .
#        # kind:    kind load docker-image harness-standalone:latest
#        # minikube: minikube image load harness-standalone:latest
#        # remote:  push to a registry and set `image:` below accordingly
#   2. Create the API-key secret (NOT committed):
#        kubectl create secret generic harness-anthropic \
#          --from-literal=api-key="$ANTHROPIC_API_KEY"
#   3. Create the cluster-secret and tenants secrets (start.sh does this for you;
#      see k8s/README.md to do it by hand):
#        harness-cluster  — the cluster secret guarding the transport handshake
#        harness-auth     — a tenants file (`<principal> <token>` per line)
#   4. kubectl apply -f k8s/harness.yaml
#
# Drive sessions over HTTP through the gateway Service (the only tenant-facing
# path; the nodes have no client-facing listener):
#   kubectl port-forward service/harness-gateway 8080:8080
#   curl -N -X POST http://127.0.0.1:8080/v1/assistant/demo/prompt \
#     -H "Authorization: Bearer <token>" -H "Content-Type: application/json" \
#     -H "Accept: text/event-stream" -d '{"turn":"t-1","content":"hello"}'
#
# See k8s/README.md for the walkthrough, the failure drill, and the sandbox
# trade-off (`local` here vs. a per-session container).
---
apiVersion: v1
kind: Service
metadata:
  name: harness
  labels:
    app: harness
spec:
  # Headless: no proxy, no cluster IP — just an A record per pod
  # (harness-0.harness, harness-1.harness, …), which is what `--peer` dials.
  clusterIP: None
  # Publish pod DNS before the pods report Ready, so a node can resolve its
  # peers during the startup window (it blocks until it has discovered them).
  publishNotReadyAddresses: true
  selector:
    app: harness
  # Node i binds transport 7401+i-1. The port on a headless service is
  # informational (it never proxies); pod-to-pod traffic reaches any port the
  # process binds.
  ports:
    - { name: transport, port: 7401 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: harness
  labels:
    app: harness
spec:
  serviceName: harness
  replicas: 3
  # Start all pods at once. Each node waits to discover every peer before it
  # reports ready, so the default one-at-a-time (OrderedReady) startup would
  # deadlock: pod 0 would wait forever for pods 1 and 2 to exist.
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: harness
  template:
    metadata:
      labels:
        app: harness
    spec:
      # Tidy shutdown for the failure drill (kill a pod, watch a survivor
      # resume its sessions); SWIM notices within a few seconds regardless.
      terminationGracePeriodSeconds: 10
      containers:
        - name: node
          image: harness-standalone:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              # Pod "harness-2" → ordinal 2 → node id 3 (ids are 1-based).
              ID="$(( ${HOSTNAME##*-} + 1 ))"
              echo "[$HOSTNAME] node id $ID; waiting for peer DNS…"
              for p in harness-0 harness-1 harness-2; do
                until getent hosts "$p.harness" >/dev/null 2>&1; do sleep 1; done
              done
              echo "[$HOSTNAME] peers resolved; starting node"
              # The node has no client-facing listener: the transport binds
              # 0.0.0.0 and is guarded by the cluster secret. --client admits the
              # two gateway pods (ids 100/101) as non-voting members so the
              # receptionist gossip reaches them; an admitted client that is not
              # up yet simply dials in later (the host need not resolve at boot).
              exec harness-standalone node \
                --id "$ID" \
                --nodes 3 \
                --data /data \
                --bind-host 0.0.0.0 \
                --peer 1=harness-0.harness \
                --peer 2=harness-1.harness \
                --peer 3=harness-2.harness \
                --client 100=harness-gw-0.harness-gw \
                --client 101=harness-gw-1.harness-gw \
                --model "${MODEL:-claude-sonnet-4-6}" \
                --sandbox local \
                --secret "$CLUSTER_SECRET"
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: harness-anthropic
                  key: api-key
            # The cluster secret guarding the transport handshake; the nodes and
            # the gateway must agree. Same Secret the gateway mounts.
            - name: CLUSTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: harness-cluster
                  key: secret
            # Override to pick a different model; every node must agree, which
            # a single StatefulSet template guarantees.
            - name: MODEL
              value: claude-sonnet-4-6
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /data
  # One PVC per pod: each node's journal + workspaces live on its own volume.
  # Nothing is shared between them.
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
# Stable per-replica DNS for the gateway pods, so the nodes' --client flags name
# them (harness-gw-0.harness-gw, …) and the gateway advertises a routable host.
apiVersion: v1
kind: Service
metadata:
  name: harness-gw
  labels:
    app: harness-gateway
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: harness-gateway
  ports:
    - { name: transport, port: 7500 }
---
# The gateway tier: the public HTTP/SSE edge, joined to the cluster as a
# non-voting CLIENT. It verifies a caller's bearer token to a tenant (it
# terminates auth, with the harness-auth tenants file) and addresses the
# session's grain directly over the transport — no control protocol. Holds no
# durable state, so scale `replicas` freely (each gets its own non-voting id;
# admit more by extending the nodes' --client flags). Public TLS is expected to
# terminate at an Ingress/LoadBalancer; the transport link is plaintext, guarded
# by the cluster secret.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: harness-gw
  labels:
    app: harness-gateway
spec:
  serviceName: harness-gw
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: harness-gateway
  template:
    metadata:
      labels:
        app: harness-gateway
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: gateway
          image: harness-standalone:latest
          imagePullPolicy: IfNotPresent
          # Override the image's `harness-standalone` entrypoint to run the
          # gateway binary the image also ships.
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              # Pod "harness-gw-1" → ordinal 1 → node id 101 (gateways are
              # 100-based, outside the nodes' 1..=3 voter roster).
              ORD="${HOSTNAME##*-}"
              NODE_ID="$(( 100 + ORD ))"
              echo "[$HOSTNAME] gateway node id $NODE_ID; waiting for node DNS…"
              for p in harness-0 harness-1 harness-2; do
                until getent hosts "$p.harness" >/dev/null 2>&1; do sleep 1; done
              done
              echo "[$HOSTNAME] nodes resolved; joining as a cluster client"
              exec harness-gateway \
                --bind 0.0.0.0:8080 \
                --secret "$CLUSTER_SECRET" \
                --node-id "$NODE_ID" \
                --nodes 3 \
                --bind-host 0.0.0.0 \
                --advertise-host "$HOSTNAME.harness-gw" \
                --peer 1=harness-0.harness \
                --peer 2=harness-1.harness \
                --peer 3=harness-2.harness \
                --auth-tokens /auth/tenants
          env:
            - name: CLUSTER_SECRET
              valueFrom:
                secretKeyRef:
                  name: harness-cluster
                  key: secret
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: auth
              mountPath: /auth
              readOnly: true
      volumes:
        - name: auth
          secret:
            secretName: harness-auth
---
apiVersion: v1
kind: Service
metadata:
  name: harness-gateway
  labels:
    app: harness-gateway
spec:
  selector:
    app: harness-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  # ClusterIP by default. Switch to LoadBalancer (or front with an Ingress) to
  # expose it outside the cluster, terminating public TLS there.
