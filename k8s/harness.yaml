# A three-node harness-standalone cluster as a StatefulSet: three pods, each
# with its OWN data volume (no shared filesystem) and a stable DNS name. The
# journal replicates over the transport (a quorum append per grain), so the
# nodes share nothing on disk.
#
# Prerequisites:
#   1. Build and load the image so the cluster can pull it:
#        docker build -t harness-standalone:latest .
#        # kind:    kind load docker-image harness-standalone:latest
#        # minikube: minikube image load harness-standalone:latest
#        # remote:  push to a registry and set `image:` below accordingly
#   2. Create the API-key secret (NOT committed):
#        kubectl create secret generic harness-anthropic \
#          --from-literal=api-key="$ANTHROPIC_API_KEY"
#   3. kubectl apply -f k8s/harness.yaml
#
# Attach a REPL (placement routes any request to the session's owner, so any
# pod works):
#   kubectl exec -it harness-0 -- harness-standalone repl 127.0.0.1:7501
#
# See k8s/README.md for the walkthrough, the failure drill, and the sandbox
# trade-off (`local` here vs. a per-session container).
---
apiVersion: v1
kind: Service
metadata:
  name: harness
  labels:
    app: harness
spec:
  # Headless: no proxy, no cluster IP — just an A record per pod
  # (harness-0.harness, harness-1.harness, …), which is what `--peer` dials.
  clusterIP: None
  # Publish pod DNS before the pods report Ready, so a node can resolve its
  # peers during the startup window (it blocks until it has discovered them).
  publishNotReadyAddresses: true
  selector:
    app: harness
  # Node i binds transport 7401+i-1 and control 7501+i-1. Ports on a headless
  # service are informational (it never proxies), so listing the bases is for
  # documentation; pod-to-pod traffic reaches any port the process binds.
  ports:
    - { name: transport, port: 7401 }
    - { name: control, port: 7501 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: harness
  labels:
    app: harness
spec:
  serviceName: harness
  replicas: 3
  # Start all pods at once. Each node waits to discover every peer before it
  # opens its control port, so the default one-at-a-time (OrderedReady) startup
  # would deadlock: pod 0 would wait forever for pods 1 and 2 to exist.
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: harness
  template:
    metadata:
      labels:
        app: harness
    spec:
      # Tidy shutdown for the failure drill (kill a pod, watch a survivor
      # resume its sessions); SWIM notices within a few seconds regardless.
      terminationGracePeriodSeconds: 10
      containers:
        - name: node
          image: harness-standalone:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              # Pod "harness-2" → ordinal 2 → node id 3 (ids are 1-based).
              ID="$(( ${HOSTNAME##*-} + 1 ))"
              echo "[$HOSTNAME] node id $ID; waiting for peer DNS…"
              for p in harness-0 harness-1 harness-2; do
                until getent hosts "$p.harness" >/dev/null 2>&1; do sleep 1; done
              done
              echo "[$HOSTNAME] peers resolved; starting node"
              exec harness-standalone node \
                --id "$ID" \
                --nodes 3 \
                --data /data \
                --bind-host 0.0.0.0 \
                --peer 1=harness-0.harness \
                --peer 2=harness-1.harness \
                --peer 3=harness-2.harness \
                --model "${MODEL:-claude-sonnet-4-6}" \
                --sandbox local
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: harness-anthropic
                  key: api-key
            # Override to pick a different model; every node must agree, which
            # a single StatefulSet template guarantees.
            - name: MODEL
              value: claude-sonnet-4-6
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /data
  # One PVC per pod: each node's journal + workspaces live on its own volume.
  # Nothing is shared between them.
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
